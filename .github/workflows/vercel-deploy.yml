name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Flutter Web and Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to an exact version instead of the "stable" channel —
          # subosito/flutter-action's channel-based resolution has been
          # failing outright ("Unable to determine Flutter version for
          # channel: stable"), which is why every previous run of this
          # workflow failed before it ever reached the build step.
          flutter-version: '3.41.7'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: >
          flutter build web --release
          --dart-define=API_BASE_URL=https://kashflip-api.onrender.com

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          working-directory: build/web
          vercel-project-id: prj_xNuyduAz1eESEHrcxg37J0XWLphM
